<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buat Panel | Luxz Hosting</title>
<style>
body {
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #111, #333);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  flex-direction: column;
}
form {
  background: #1e1e1e;
  padding: 25px;
  border-radius: 15px;
  box-shadow: 0 0 15px rgba(255,255,255,0.1);
  display: flex;
  flex-direction: column;
  width: 320px;
}
input, select, button {
  margin-top: 10px;
  padding: 10px;
  border-radius: 8px;
  border: none;
  outline: none;
}
button {
  background: #0d6efd;
  color: white;
  cursor: pointer;
  transition: 0.3s;
}
button:hover { background: #0b5ed7; }
.loader {
  display: none;
  border: 4px solid rgba(255,255,255,0.1);
  border-top: 4px solid #0d6efd;
  border-radius: 50%;
  width: 40px;
  height: 40px;
  animation: spin 1s linear infinite;
  margin: 20px auto;
}
@keyframes spin { 100% { transform: rotate(360deg); } }
</style>
</head>
<body>
<h2>Buat Panel Baru</h2>
<div class="loader" id="loader"></div>
<form action="create_panel.php" method="POST" onsubmit="return loadingEffect()">
  <label>Username:</label>
  <input type="text" name="username" required>
  <label>Password:</label>
  <input type="text" name="password" required>
  <label>RAM (GB):</label>
  <select name="ram">
    <option value="1">1</option>
    <option value="2">2</option>
    <option value="4">4</option>
    <option value="8">8</option>
    <option value="Unlimited">Unlimited</option>
  </select>
  <label>CPU (Core):</label>
  <select name="cpu">
    <option value="1">1</option>
    <option value="2">2</option>
    <option value="4">4</option>
    <option value="8">8</option>
    <option value="Unlimited">Unlimited</option>
  </select>
  <button type="submit">Buat Panel</button>
</form>

<script>
function loadingEffect() {
  document.getElementById('loader').style.display = 'block';
  setTimeout(() => { return true; }, 2000);
}
</script>
</body>
</html>
