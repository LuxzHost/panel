<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Log Admin | Luxz Hosting</title>
<style>
body {
  font-family: Arial;
  background: #111;
  color: white;
  padding: 30px;
}
textarea {
  width: 100%;
  height: 400px;
  background: #1a1a1a;
  color: #0f0;
  border: none;
  padding: 10px;
  border-radius: 10px;
}
button {
  margin-top: 10px;
  padding: 10px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}
</style>
</head>
<body>
<h2>Admin Log Panel</h2>
<div id="login">
  <p>Masukkan Password Admin:</p>
  <input type="password" id="password">
  <button onclick="login()">Masuk</button>
</div>
<div id="logArea" style="display:none;">
  <textarea id="logs" readonly></textarea><br>
  <button onclick="loadLogs()">🔄 Refresh Log</button>
  <button onclick="clearLogs()">🗑️ Hapus Semua Log</button>
</div>
<script>
const ADMIN_PASSWORD = "luxzz";
function login(){
  const pw = document.getElementById('password').value;
  if(pw === ADMIN_PASSWORD){
    document.getElementById('login').style.display = 'none';
    document.getElementById('logArea').style.display = 'block';
    loadLogs();
  } else { alert("Password salah!"); }
}
function loadLogs(){
  fetch('logs.txt').then(r=>r.text()).then(t=>{ document.getElementById('logs').value = t; });
}
function clearLogs(){
  fetch('reset_logs.php').then(r=>r.text()).then(alert).then(loadLogs);
}
</script>
</body>
</html>
